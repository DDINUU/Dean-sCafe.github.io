<form class="order-form" id="cafe-order-form">
            
            <div class="form-group">
                <label for="name">Your Name:</label>
                <input type="text" id="name" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label for="species">Select Your Species (For kitchen safety):</label>
                <select id="species" required>
                    <option value="" disabled selected>Select your true identity...</option>
                    <option value="human">Human (Normal Menu)</option>
                    <option value="ghoul">Ghoul (Special Menu)</option>
                    <option value="ccg">CCG Investigator (We are closed for you)</option>
                </select>
            </div>

           
            <div class="form-group">
                <label for="order-item">Choose Your Order:</label>
                <select id="order-item" required>
                    <option value="" disabled selected>Select an item from the menu...</option>
                    <optgroup label="Shared Tastes">
                        <option value="black-coffee">☕ Black Coffee (₹150)</option>
                        <option value="espresso">☕ Espresso Shot (₹120)</option>
                    </optgroup>
                    <optgroup label="Human Delights">
                        <option value="sandwich">🍔 Classic Club Sandwich (₹200)</option>
                        <option value="cake">🍰 Chocolate Cake (₹180)</option>
                    </optgroup>
                    <optgroup label="The Special Menu">
                        <option value="crimson-latte">🩸 The Crimson Latte (₹250)</option>
                        <option value="meat-cubes">🥩 Mystery Meat Cubes (₹400)</option>
                    </optgroup>
                </select>
            </div>

            <div class="form-group">
                <label for="quantity">Quantity:</label>
                <input type="number" id="quantity" min="1" max="10" value="1" required>
            </div>

            <div class="form-group">
                <label for="address">Delivery Address / Ward Number:</label>
                <input type="text" id="address" placeholder="e.g., 20th Ward, Tokyo" required>
            </div>

            <button type="submit" class="submit-btn">⚡ Confirm Order</button>

            
            <div id="success-message" style="display: none; background: #55efc4; color: #1c1c1c; padding: 15px; border-radius: 5px; margin-top: 20px; text-align: center; font-weight: bold; border-left: 5px solid #00b894;">
                🎉 Order Confirmed! Our fastest Ghoul is dashing across the rooftops to deliver it. 🏃‍♂️💨
            </div>
        </form>
